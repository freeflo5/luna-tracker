<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna — Cycle Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b10;
    --surface: #16121c;
    --border: rgba(255,255,255,0.07);
    --green: #a8e6b0;
    --green-glow: rgba(168, 230, 176, 0.25);
    --green-dim: rgba(168, 230, 176, 0.55);
    --red: #f4a4a4;
    --red-glow: rgba(244, 164, 164, 0.25);
    --red-dim: rgba(244, 164, 164, 0.55);
    --muted: rgba(255,255,255,0.3);
    --text: rgba(255,255,255,0.88);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    transition: background 2s ease, opacity 2s ease;
  }
  body::before {
    width: 400px; height: 400px;
    top: -100px; right: -100px;
    background: var(--blob1, rgba(168,230,176,0.06));
  }
  body::after {
    width: 350px; height: 350px;
    bottom: -80px; left: -80px;
    background: var(--blob2, rgba(168,230,176,0.04));
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 52px 48px 44px;
    width: 380px;
    max-width: 94vw;
    text-align: center;
    box-shadow: 0 0 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .moon-icon {
    font-size: 28px;
    margin-bottom: 6px;
    display: block;
    animation: moonFloat 4s ease-in-out infinite;
  }
  @keyframes moonFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 44px;
  }

  /* Big day counter */
  .counter-wrap {
    margin-bottom: 36px;
  }

  .day-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .day-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 100px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    transition: color 0.6s ease, text-shadow 0.6s ease;
  }

  .day-number.green {
    color: var(--green);
    text-shadow: 0 0 60px var(--green-glow), 0 0 120px var(--green-glow);
  }
  .day-number.red {
    color: var(--red);
    text-shadow: 0 0 60px var(--red-glow), 0 0 120px var(--red-glow);
  }
  .day-number.none {
    color: rgba(255,255,255,0.15);
    text-shadow: none;
  }

  .phase-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    margin-top: 8px;
    transition: color 0.6s ease, opacity 0.6s ease;
    min-height: 22px;
  }
  .phase-label.green { color: var(--green-dim); }
  .phase-label.red   { color: var(--red-dim); }
  .phase-label.none  { color: var(--muted); }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 36px;
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1), background 0.6s ease;
    width: 0%;
  }
  .progress-fill.green { background: linear-gradient(90deg, var(--green-glow), var(--green)); }
  .progress-fill.red   { background: linear-gradient(90deg, var(--red-glow), var(--red)); }

  .progress-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }
  .tick {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.18);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 28px;
  }

  /* Start date display */
  .start-info {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    min-height: 18px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
  }

  /* Buttons */
  .btn-primary {
    display: inline-block;
    width: 100%;
    padding: 15px 0;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.6s ease;
    background: linear-gradient(135deg, rgba(168,230,176,0.15), rgba(168,230,176,0.08));
    color: var(--green);
    border: 1px solid rgba(168,230,176,0.2);
    margin-bottom: 10px;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(168,230,176,0.1);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-reset {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-reset:hover { color: var(--muted); background: rgba(255,255,255,0.04); }

  /* Date picker overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .picker-card {
    background: #1c1824;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 36px 32px 28px;
    width: 320px;
    max-width: 90vw;
    text-align: center;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .overlay.open .picker-card { transform: scale(1) translateY(0); }

  .picker-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 20px;
    margin-bottom: 6px;
    color: var(--text);
  }
  .picker-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }

  .date-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    text-align: center;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    color-scheme: dark;
  }
  .date-input:focus { border-color: rgba(168,230,176,0.4); }

  .picker-actions { display: flex; gap: 10px; }
  .btn-confirm {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, rgba(168,230,176,0.2), rgba(168,230,176,0.1));
    color: var(--green);
    border: 1px solid rgba(168,230,176,0.25);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-confirm:hover { opacity: 0.85; }
  .btn-cancel {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  /* Pulse animation on number change */
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .pulse { animation: pulse 0.4s ease; }

  .no-select { user-select: none; }
</style>
</head>
<body>

<div class="card no-select">
  <span class="moon-icon">🌙</span>
  <h1>Luna</h1>

  <div class="counter-wrap">
    <div class="day-label">Day of cycle</div>
    <div class="day-number none" id="dayNumber">—</div>
    <div class="phase-label none" id="phaseLabel">Tap below to begin</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-ticks">
      <span class="tick">Day 0</span>
      <span class="tick">7</span>
      <span class="tick">14</span>
      <span class="tick">21</span>
      <span class="tick">28+</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="start-info" id="startInfo">No cycle set yet</div>

  <button class="btn-primary" id="mainBtn" onclick="openPicker()">
    Set first day of period
  </button>
  <br>
  <button class="btn-reset" id="resetBtn" onclick="clearCycle()" style="display:none">
    Clear cycle
  </button>
</div>

<!-- Date picker overlay -->
<div class="overlay" id="overlay">
  <div class="picker-card">
    <div class="picker-title">First day of period</div>
    <div class="picker-sub">Select today or a recent date</div>
    <input type="date" class="date-input" id="dateInput">
    <div class="picker-actions">
      <button class="btn-cancel" onclick="closePicker()">Cancel</button>
      <button class="btn-confirm" onclick="confirmDate()">Confirm</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'luna_cycle_start';

  function getStoredDate() {
    const val = localStorage.getItem(STORAGE_KEY);
    return val ? new Date(val + 'T00:00:00') : null;
  }

  function storeDate(dateStr) {
    localStorage.setItem(STORAGE_KEY, dateStr);
  }

  function clearCycle() {
    localStorage.removeItem(STORAGE_KEY);
    render();
  }

  function daysDiff(from) {
    const now = new Date();
    const start = new Date(from);
    // Zero out times for clean day diff
    now.setHours(0,0,0,0);
    start.setHours(0,0,0,0);
    return Math.floor((now - start) / 86400000);
  }

  function getColor(day) {
    if (day < 0)  return 'none';
    if (day <= 6)  return 'green';
    if (day <= 14) return 'red';
    return 'green';
  }

  function getPhase(day) {
    if (day < 0)  return '';
    if (day === 0) return 'First day — cycle begins';
    if (day <= 6)  return 'Menstrual phase';
    if (day <= 14) return 'Fertile window';
    return 'Luteal phase';
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function render() {
    const startDate = getStoredDate();
    const dayNum   = document.getElementById('dayNumber');
    const phaseEl  = document.getElementById('phaseLabel');
    const fillEl   = document.getElementById('progressFill');
    const infoEl   = document.getElementById('startInfo');
    const mainBtn  = document.getElementById('mainBtn');
    const resetBtn = document.getElementById('resetBtn');

    if (!startDate) {
      dayNum.textContent = '—';
      dayNum.className = 'day-number none';
      phaseEl.textContent = 'Tap below to begin';
      phaseEl.className = 'phase-label none';
      fillEl.style.width = '0%';
      fillEl.className = 'progress-fill';
      infoEl.textContent = 'No cycle set yet';
      mainBtn.textContent = 'Set first day of period';
      resetBtn.style.display = 'none';
      document.body.style.setProperty('--blob1', 'rgba(168,230,176,0.06)');
      document.body.style.setProperty('--blob2', 'rgba(168,230,176,0.04)');
      return;
    }

    const startStr = localStorage.getItem(STORAGE_KEY);
    const day = daysDiff(startDate);
    const color = getColor(day);
    const phase = getPhase(day);

    // Animate number
    dayNum.classList.remove('pulse');
    void dayNum.offsetWidth;
    dayNum.classList.add('pulse');

    dayNum.textContent = day < 0 ? '—' : day;
    dayNum.className = `day-number ${color}`;
    phaseEl.textContent = phase;
    phaseEl.className = `phase-label ${color}`;

    // Progress bar — based on 28-day average cycle
    const progress = Math.min(Math.max(day / 28 * 100, 0), 100);
    fillEl.style.width = progress + '%';
    fillEl.className = `progress-fill ${color}`;

    infoEl.textContent = `Since ${formatDate(startStr)}`;

    mainBtn.textContent = 'Reset — new period started';
    resetBtn.style.display = 'inline-block';

    // Ambient blobs
    if (color === 'red') {
      document.body.style.setProperty('--blob1', 'rgba(244,164,164,0.07)');
      document.body.style.setProperty('--blob2', 'rgba(244,164,164,0.04)');
    } else {
      document.body.style.setProperty('--blob1', 'rgba(168,230,176,0.07)');
      document.body.style.setProperty('--blob2', 'rgba(168,230,176,0.04)');
    }
  }

  function openPicker() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
    document.getElementById('overlay').classList.add('open');
  }

  function closePicker() {
    document.getElementById('overlay').classList.remove('open');
  }

  function confirmDate() {
    const val = document.getElementById('dateInput').value;
    if (!val) return;
    storeDate(val);
    closePicker();
    render();
  }

  // Close overlay on backdrop click
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closePicker();
  });

  // Auto-refresh every minute to keep day count current
  render();
  setInterval(render, 60000);
</script>
</body>
</html>
