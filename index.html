<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luna">
<title>Luna</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b10;
    --surface: #16121c;
    --surface2: #1c1824;
    --border: rgba(255,255,255,0.07);
    --green: #a8e6b0;
    --green-glow: rgba(168,230,176,0.22);
    --green-dim: rgba(168,230,176,0.55);
    --red: #f4a4a4;
    --red-glow: rgba(244,164,164,0.22);
    --red-dim: rgba(244,164,164,0.55);
    --muted: rgba(255,255,255,0.3);
    --text: rgba(255,255,255,0.88);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: var(--safe-top) 16px var(--safe-bottom);
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
    transition: background 2s ease;
  }
  body::before {
    width: 420px; height: 420px;
    top: -120px; right: -120px;
    background: var(--blob1, rgba(168,230,176,0.055));
  }
  body::after {
    width: 360px; height: 360px;
    bottom: -100px; left: -100px;
    background: var(--blob2, rgba(168,230,176,0.035));
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 1;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 0 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
    animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .moon {
    font-size: 30px;
    display: block;
    margin-bottom: 8px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }

  /* ── SETUP SCREEN ── */
  .setup-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    margin-bottom: 6px;
    color: var(--text);
  }
  .setup-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .tab-row {
    display: flex;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 3px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tab.active {
    background: rgba(168,230,176,0.12);
    color: var(--green);
    border: 1px solid rgba(168,230,176,0.15);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    margin-bottom: 8px;
    display: block;
  }

  .text-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    text-align: center;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.12em;
  }
  .text-input:focus { border-color: rgba(168,230,176,0.4); }
  .text-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 0.05em; }

  .code-display {
    background: rgba(168,230,176,0.07);
    border: 1px solid rgba(168,230,176,0.2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .code-display .code-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--green);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .code-display .code-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── BUTTONS ── */
  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
    margin-bottom: 10px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-green {
    background: linear-gradient(135deg, rgba(168,230,176,0.18), rgba(168,230,176,0.08));
    color: var(--green);
    border: 1px solid rgba(168,230,176,0.22);
  }
  .btn-green:hover { box-shadow: 0 6px 24px rgba(168,230,176,0.1); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-red {
    background: linear-gradient(135deg, rgba(244,164,164,0.15), rgba(244,164,164,0.07));
    color: var(--red);
    border: 1px solid rgba(244,164,164,0.2);
  }

  .btn-sm {
    background: none;
    border: none;
    color: rgba(255,255,255,0.18);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    display: inline-block;
    margin-top: 4px;
  }
  .btn-sm:hover { color: var(--muted); background: rgba(255,255,255,0.04); }

  .error-msg {
    font-size: 12px;
    color: var(--red);
    margin-bottom: 12px;
    min-height: 18px;
    letter-spacing: 0.03em;
  }

  /* ── MAIN TRACKER SCREEN ── */
  .couple-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .couple-badge:hover { border-color: rgba(255,255,255,0.15); }
  .couple-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green-glow);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .day-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .day-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 108px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -5px;
    transition: color 0.7s ease, text-shadow 0.7s ease;
  }
  .day-number.green {
    color: var(--green);
    text-shadow: 0 0 70px var(--green-glow), 0 0 140px var(--green-glow);
  }
  .day-number.red {
    color: var(--red);
    text-shadow: 0 0 70px var(--red-glow), 0 0 140px var(--red-glow);
  }
  .day-number.none { color: rgba(255,255,255,0.12); text-shadow: none; }

  .phase-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    margin-top: 6px;
    margin-bottom: 32px;
    min-height: 24px;
    transition: color 0.7s ease;
  }
  .phase-label.green { color: var(--green-dim); }
  .phase-label.red   { color: var(--red-dim); }
  .phase-label.none  { color: var(--muted); }

  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s cubic-bezier(0.34,1.56,0.64,1), background 0.7s ease;
    width: 0%;
  }
  .progress-fill.green { background: linear-gradient(90deg, transparent, var(--green)); }
  .progress-fill.red   { background: linear-gradient(90deg, transparent, var(--red)); }

  .progress-ticks {
    display: flex;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .tick { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 0.08em; }

  .divider { height: 1px; background: var(--border); margin-bottom: 24px; }

  .start-info {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    min-height: 20px;
  }

  /* ── DATE PICKER OVERLAY ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    padding-bottom: var(--safe-bottom);
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .picker-sheet {
    background: #1e1a28;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px 24px 0 0;
    padding: 32px 28px 28px;
    width: 100%;
    max-width: 440px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .overlay.open .picker-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 99px;
    margin: 0 auto 24px;
  }
  .sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .sheet-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

  .date-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    text-align: center;
    margin-bottom: 20px;
    outline: none;
    -webkit-appearance: none;
    color-scheme: dark;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: rgba(168,230,176,0.4); }

  .sheet-actions { display: flex; gap: 10px; }
  .sheet-actions .btn { margin-bottom: 0; flex: 1; }

  /* ── LOADING ── */
  .loading-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: loadPulse 1s ease-in-out infinite;
    margin: 0 3px;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes loadPulse {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50%      { opacity: 1; transform: scale(1); }
  }

  @keyframes numPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  .pulse { animation: numPulse 0.4s ease; }

  .no-select { user-select: none; -webkit-user-select: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(32px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,26,40,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 30;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body class="no-select">

<!-- LOADING SCREEN -->
<div class="screen active" id="screenLoading">
  <div style="text-align:center">
    <span class="moon">🌙</span>
    <div style="margin-top:20px">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
  </div>
</div>

<!-- SETUP SCREEN -->
<div class="screen" id="screenSetup">
  <div class="card">
    <span class="moon">🌙</span>
    <h1>Luna</h1>
    <div class="setup-title">Welcome</div>
    <div class="setup-sub">Create a couple code or join your partner's</div>

    <div class="tab-row">
      <button class="tab active" onclick="switchTab('create')">Create</button>
      <button class="tab" onclick="switchTab('join')">Join</button>
    </div>

    <!-- CREATE TAB -->
    <div class="tab-panel active" id="tabCreate">
      <div class="code-display">
        <div class="code-val" id="generatedCode">—</div>
        <div class="code-hint">Your couple code — share this with your partner</div>
      </div>
      <div class="error-msg" id="createError"></div>
      <button class="btn btn-green" onclick="createCouple()">Create & Enter</button>
      <button class="btn btn-ghost" onclick="generateCode()">Generate new code</button>
    </div>

    <!-- JOIN TAB -->
    <div class="tab-panel" id="tabJoin">
      <label class="input-label">Enter your couple code</label>
      <input class="text-input" id="joinCodeInput" type="text" placeholder="moon-river-4829" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="error-msg" id="joinError"></div>
      <button class="btn btn-green" onclick="joinCouple()">Join</button>
    </div>
  </div>
</div>

<!-- MAIN TRACKER SCREEN -->
<div class="screen" id="screenMain">
  <div class="card">
    <div class="couple-badge" id="coupleBadge" onclick="showCodeToast()">
      <span class="dot"></span>
      <span id="badgeCode">—</span>
    </div>

    <div class="day-label">Day of cycle</div>
    <div class="day-number none" id="dayNumber">—</div>
    <div class="phase-label none" id="phaseLabel">No cycle set yet</div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-ticks">
      <span class="tick">Day 0</span>
      <span class="tick">7</span>
      <span class="tick">14</span>
      <span class="tick">21</span>
      <span class="tick">28+</span>
    </div>

    <div class="divider"></div>
    <div class="start-info" id="startInfo">Tap below to set the first day</div>

    <button class="btn btn-green" id="mainBtn" onclick="openPicker()">Set first day of period</button>
    <button class="btn-sm" id="leaveBtn" onclick="leaveCouple()">Leave couple</button>
  </div>
</div>

<!-- DATE PICKER OVERLAY -->
<div class="overlay" id="overlay">
  <div class="picker-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">First day of period</div>
    <div class="sheet-sub">Select today or a recent date</div>
    <input type="date" class="date-input" id="dateInput">
    <div class="sheet-actions">
      <button class="btn btn-ghost" onclick="closePicker()">Cancel</button>
      <button class="btn btn-green" onclick="confirmDate()">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBC1BcvCZMmngKc4TTLgUZnYyFblOz3lOM",
    authDomain: "luna-tracker-5aab2.firebaseapp.com",
    databaseURL: "https://luna-tracker-5aab2-default-rtdb.firebaseio.com",
    projectId: "luna-tracker-5aab2",
    storageBucket: "luna-tracker-5aab2.firebasestorage.app",
    messagingSenderId: "938048088350",
    appId: "1:938048088350:web:ac34ce02a4a081171d810f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── ADJECTIVE + NOUN word lists for code generation
  const adjs = ['moon','rose','star','dawn','mist','silk','jade','sage','fern','gold','iris','opal','reef','snow','dusk','tide','glow','ember','coral','frost'];
  const nouns = ['river','bloom','light','dream','petal','grace','haven','spark','cloud','stone','flame','cedar','grove','field','shore','pearl','amber','drift','crest','echo'];

  function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function rndNum() { return String(Math.floor(1000 + Math.random() * 9000)); }

  window.generateCode = function() {
    const code = `${rnd(adjs)}-${rnd(nouns)}-${rndNum()}`;
    document.getElementById('generatedCode').textContent = code;
  };

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(tab === 'create' ? 'tabCreate' : 'tabJoin').classList.add('active');
  };

  window.createCouple = async function() {
    const code = document.getElementById('generatedCode').textContent;
    if (code === '—') { generateCode(); return; }
    const errEl = document.getElementById('createError');
    errEl.textContent = '';
    try {
      // Check it doesn't already exist
      const snap = await get(ref(db, `couples/${code}`));
      if (snap.exists()) {
        generateCode();
        errEl.textContent = 'Code taken, generated a new one — try again';
        return;
      }
      await set(ref(db, `couples/${code}/created`), Date.now());
      localStorage.setItem('luna_couple_code', code);
      enterApp(code);
    } catch(e) {
      errEl.textContent = 'Connection error — check your internet';
    }
  };

  window.joinCouple = async function() {
    const raw = document.getElementById('joinCodeInput').value.trim().toLowerCase();
    const errEl = document.getElementById('joinError');
    errEl.textContent = '';
    if (!raw) { errEl.textContent = 'Please enter a code'; return; }
    try {
      const snap = await get(ref(db, `couples/${raw}`));
      if (!snap.exists()) {
        errEl.textContent = "Code not found — double-check with your partner";
        return;
      }
      localStorage.setItem('luna_couple_code', raw);
      enterApp(raw);
    } catch(e) {
      errEl.textContent = 'Connection error — check your internet';
    }
  };

  let unsubscribe = null;

  function enterApp(code) {
    document.getElementById('badgeCode').textContent = code;
    showScreen('screenMain');

    // Listen in real time
    if (unsubscribe) unsubscribe();
    const cycleRef = ref(db, `couples/${code}/cycleStart`);
    unsubscribe = onValue(cycleRef, (snap) => {
      const val = snap.val();
      renderTracker(val);
    });
  }

  window.leaveCouple = function() {
    if (!confirm('Leave this couple? You can rejoin with the same code.')) return;
    localStorage.removeItem('luna_couple_code');
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    showScreen('screenSetup');
  };

  window.openPicker = function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
    document.getElementById('overlay').classList.add('open');
  };

  window.closePicker = function() {
    document.getElementById('overlay').classList.remove('open');
  };

  window.confirmDate = async function() {
    const val = document.getElementById('dateInput').value;
    if (!val) return;
    const code = localStorage.getItem('luna_couple_code');
    if (!code) return;
    await set(ref(db, `couples/${code}/cycleStart`), val);
    closePicker();
  };

  window.showCodeToast = function() {
    const code = localStorage.getItem('luna_couple_code') || '—';
    showToast(`Code: ${code}`);
  };

  // ── RENDER
  function renderTracker(startDateStr) {
    const dayNum  = document.getElementById('dayNumber');
    const phase   = document.getElementById('phaseLabel');
    const fill    = document.getElementById('progressFill');
    const info    = document.getElementById('startInfo');
    const mainBtn = document.getElementById('mainBtn');

    if (!startDateStr) {
      dayNum.textContent = '—';
      dayNum.className = 'day-number none';
      phase.textContent = 'No cycle set yet';
      phase.className = 'phase-label none';
      fill.style.width = '0%';
      fill.className = 'progress-fill';
      info.textContent = 'Tap below to set the first day';
      mainBtn.textContent = 'Set first day of period';
      setBlobs('green');
      return;
    }

    const start = new Date(startDateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    const day = Math.floor((now - start) / 86400000);

    const color = day < 0 ? 'none' : day <= 6 ? 'green' : day <= 14 ? 'red' : 'green';
    const phaseText = day < 0 ? '' : day === 0 ? 'First day — cycle begins' : day <= 6 ? 'Menstrual phase' : day <= 14 ? 'Fertile window' : 'Luteal phase';

    dayNum.classList.remove('pulse');
    void dayNum.offsetWidth;
    dayNum.classList.add('pulse');

    dayNum.textContent = day < 0 ? '—' : day;
    dayNum.className = `day-number ${color}`;
    phase.textContent = phaseText;
    phase.className = `phase-label ${color}`;

    const pct = Math.min(Math.max(day / 28 * 100, 0), 100);
    fill.style.width = pct + '%';
    fill.className = `progress-fill ${color}`;

    const opts = { weekday: 'long', month: 'long', day: 'numeric' };
    info.textContent = `Since ${start.toLocaleDateString('en-US', opts)}`;
    mainBtn.textContent = 'Reset — new period started';
    setBlobs(color);
  }

  function setBlobs(color) {
    const c = color === 'red';
    document.body.style.setProperty('--blob1', c ? 'rgba(244,164,164,0.07)' : 'rgba(168,230,176,0.07)');
    document.body.style.setProperty('--blob2', c ? 'rgba(244,164,164,0.04)' : 'rgba(168,230,176,0.04)');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  };

  // Close picker on backdrop
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closePicker();
  });

  // ── INIT
  generateCode();
  const saved = localStorage.getItem('luna_couple_code');
  if (saved) {
    enterApp(saved);
  } else {
    showScreen('screenSetup');
  }

  // Auto-refresh day count at midnight
  setInterval(() => {
    const code = localStorage.getItem('luna_couple_code');
    if (code) {
      get(ref(db, `couples/${code}/cycleStart`)).then(s => renderTracker(s.val()));
    }
  }, 60000);
</script>
</body>
</html>
